name: Deploy to Railway

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Railway Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Railway CLI kur
        run: npm install -g @railway/cli

      - name: Railway'e deploy et
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
