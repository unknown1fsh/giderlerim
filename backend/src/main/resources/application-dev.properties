# Gelistirme ortami ayarlari
# Bu dosya sadece yerel gelistirme icin kullanilir

# JWT - Yerel gelistirme icin varsayilan anahtar
jwt.secret=${JWT_SECRET:dev-only-secret-key-bu-anahtar-sadece-yerel-gelistirme-icin-kullanilir-uretimde-degistirin}

# Anthropic AI - Yerel gelistirme icin kendi API anahtarinizi .env dosyasina koyun
anthropic.api.key=${ANTHROPIC_API_KEY:}

# Veritabani - Yerel gelistirme varsayilanlari
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/giderlerim?stringtype=unspecified}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:giderlerimuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:giderlerimpassword}

# CORS - Yerel frontend
allowed.origin=${ALLOWED_ORIGIN:http://localhost:3000}
