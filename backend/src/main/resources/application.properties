# Uygulama
spring.application.name=giderlerim
server.port=8081
server.address=127.0.0.1

# Veritabanı
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/giderlerim?stringtype=unspecified}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:giderlerimuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:giderlerimpassword}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT (Railway: JWT_SECRET zorunlu; süreler ms cinsinden isteğe bağlı override)
jwt.secret=${JWT_SECRET:}
jwt.expiration.access=${JWT_EXPIRATION_ACCESS:3600000}
jwt.expiration.refresh=${JWT_EXPIRATION_REFRESH:604800000}

# OpenAI (Railway: OPENAI_API_KEY zorunlu; model/token isteğe bağlı)
openai.api.key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4o}
openai.max-tokens=${OPENAI_MAX_TOKENS:4096}

# CORS
allowed.origin=${ALLOWED_ORIGIN:http://localhost:3000}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoints.web.base-path=/api/v1/actuator

# Shopier OAuth uygulaması (Railway: gizli değerleri Variables ile verin; repoya yazmayın)
shopier.webhook.token=${SHOPIER_WEBHOOK_TOKEN:}
shopier.oauth.client-id=${SHOPIER_OAUTH_CLIENT_ID:}
shopier.oauth.client-secret=${SHOPIER_OAUTH_CLIENT_SECRET:}

# Multipart
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB
