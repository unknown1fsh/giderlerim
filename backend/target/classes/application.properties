# Uygulama
spring.application.name=giderlerim
server.port=8081
server.address=127.0.0.1

# Veritabanı
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/giderlerim?stringtype=unspecified}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:giderlerimuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:giderlerimpassword}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=${JWT_SECRET:}
jwt.expiration.access=3600000
jwt.expiration.refresh=604800000

# Anthropic AI
anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.model=claude-sonnet-4-6
anthropic.max-tokens=4096

# CORS
allowed.origin=${ALLOWED_ORIGIN:http://localhost:3000}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoints.web.base-path=/api/v1/actuator

# Multipart
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB
